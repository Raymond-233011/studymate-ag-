  const prompt = `Bạn là trợ lý học tập thông minh cho học sinh THPT tỉnh An Giang. Phân tích học lực và đưa ra gợi ý CỤ THỂ.

Dữ liệu:
${JSON.stringify(payload, null, 2)}

Trả về JSON ĐÚNG cấu trúc (không thêm text nào khác):
{"nhanXet":"Nhận xét 2-3 câu","diemManh":["điểm mạnh 1","điểm mạnh 2"],"diemYeu":["điểm yếu 1","điểm yếu 2"],"goiY":["Gợi ý 1","Gợi ý 2","Gợi ý 3"],"loTrinh":"Lộ trình 4 tuần"}`;

  const res = await fetch('/api/ai', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error('Lỗi API: ' + res.status);
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  const text = d.content?.map(i => i.text || '').join('') || '';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SB_HEADERS = {
  "Content-Type": "application/json",
  "apikey": SUPA_KEY,
  "Authorization": "Bearer " + SUPA_KEY,
  "Prefer": "return=representation"
};
const db = {
  async get(table, q="") {
    const r = await fetch(SUPA_URL+"/rest/v1/"+table+"?"+q, {headers: SB_HEADERS});
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(SUPA_URL+"/rest/v1/"+table, {method:"POST",headers:SB_HEADERS,body:JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function calcTBM(sc) {
  if (!sc) return null;
  const avg = arr => arr&&arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const tx = avg([...(sc.diemMieng||[]),...(sc.diemTX||[])]);
  const ck = sc.diemCK??null, gk = sc.diemGK??null;
  if (tx===null||ck===null) return null;
  return parseFloat((gk!==null?(tx*3+gk*2+ck*3)/8:(tx*3+ck*5)/8).toFixed(1));
}
function classify(t) {
  if (t===null||t===undefined) return {label:"Chưa đủ dữ liệu",color:"#64748b"};
  if (t>=8) return {label:"Giỏi",color:"#4ade80"};
  if (t>=6.5) return {label:"Khá",color:"#38bdf8"};
  if (t>=5) return {label:"Trung bình",color:"#fbbf24"};
  return {label:"Yếu",color:"#f87171"};
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// TEACHER LOGIN / CREATE
// ══════════════════════════════════════════════════════════════════════════════
function TeacherLogin({onLogin, onBack}) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({name:"",code:"",pass:"",pass2:""});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  async function handleLogin() {
    if (!form.code||!form.pass) return setError("Vui lòng nhập đủ thông tin");
    setLoading(true); setError("");
    try {
      const rows = await db.get("classes","code=eq."+form.code.toUpperCase()+"&select=*");
      if (!rows.length) return setError("Không tìm thấy mã lớp");
      if (rows[0].password !== form.pass) return setError("Sai mật khẩu");
      onLogin(rows[0]);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  async function handleCreate() {
    if (!form.name||!form.code||!form.pass) return setError("Nhập đủ thông tin");
    if (form.pass !== form.pass2) return setError("Mật khẩu không khớp");
    if (form.code.length < 4) return setError("Mã lớp phải từ 4 ký tự");
    setLoading(true); setError("");
    try {
      const rows = await db.post("classes",{code:form.code.toUpperCase(),teacher_name:form.name,password:form.pass});
      onLogin(rows[0]);
    } catch(e) { setError(e.message.includes("unique")?"Mã lớp đã tồn tại":e.message); }
    setLoading(false);
  }

  const Field = ({k,ph,type="text"}) => (
    <input style={{...st.input,marginBottom:10}} placeholder={ph} type={type}
      value={form[k]} onChange={e=>set(k,e.target.value)}/>
  );

  return (
    <div style={{...st.app,padding:"20px 16px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,marginBottom:16}}>← Quay lại</button>
      <div style={{...st.logo,fontSize:20,marginBottom:4}}>👨‍🏫 Giáo viên</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Quản lý lớp học và bài tập</div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {["login","create"].map(m=>(
          <button key={m} onClick={()=>{setMode(m);setError("");}}
            style={{...btnSm(m===mode?C.accent:"transparent",m===mode?"#0a0e1a":C.muted),border:"1px solid "+(m===mode?C.accent:C.border),flex:1}}>
            {m==="login"?"Đăng nhập":"Tạo lớp mới"}
          </button>
        ))}
      </div>
      {mode==="create" && <Field k="name" ph="Tên giáo viên"/>}
      <Field k="code" ph="Mã lớp (VD: TOAN12A)"/>
      <Field k="pass" ph="Mật khẩu" type="password"/>
      {mode==="create" && <Field k="pass2" ph="Xác nhận mật khẩu" type="password"/>}
      {error && <div style={{...st.err,margin:"0 0 10px"}}>⚠️ {error}</div>}
      <button style={btn(C.accent)} disabled={loading} onClick={mode==="login"?handleLogin:handleCreate}>
        {loading ? <span style={st.spin}/> : (mode==="login"?"Đăng nhập":"Tạo lớp")}
      </button>
    </div>
  );
}

  return (

        {loading ? <span style={st.spin}/> : "Vào lớp →"}
      </button>
    </div>
  );
}

  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  useEffect(()=>{ loadAssignments(); },[]);

  async function loadAssignments() {
    setLoading(true);
    try { setAssignments(await db.get("assignments","class_id=eq."+cls.id+"&order=created_at.desc")); }
    catch(e) { setError(e.message); }
    setLoading(false);
  }

  async function createAssignment() {
    if (!form.title.trim()) return setError("Nhập tên bài tập");
    setSaving(true); setError("");
    try {
      await db.post("assignments",{class_id:cls.id,title:form.title,subject:form.subject,num_questions:parseInt(form.num),deadline:form.deadline||null});
      setForm({title:"",subject:SUBJECTS[0],num:10,deadline:""});
      setTab("list");
      await loadAssignments();
    } catch(e) { setError(e.message); }
    setSaving(false);

    setSelected(a); setTab("results");
    try { setSubmissions(await db.get("submissions","assignment_id=eq."+a.id+"&order=submitted_at.desc")); }

  const [assignments, setAssignments] = useState([]);
  const [doneIds, setDoneIds] = useState([]);
  const [loading, setLoading] = useState(true);
  const [doing, setDoing] = useState(null);
  const [qs, setQs] = useState([]);
  const [answers, setAnswers] = useState({});
  const [qIdx, setQIdx] = useState(0);
  const [result, setResult] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  useEffect(()=>{ loadData(); },[]);

  async function loadData() {
    setLoading(true);
    try {
      const [asgn, subs] = await Promise.all([
        db.get("assignments","class_id=eq."+cls.id+"&order=created_at.desc"),
        db.get("submissions","student_name=eq."+encodeURIComponent(studentName))
      ]);
      setAssignments(asgn);
      setDoneIds(subs.map(s=>s.assignment_id));
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  function startAssignment(a) {
    setQs(getRandQs(a.subject,a.num_questions));
    setAnswers({}); setQIdx(0); setResult(null); setDoing(a);
  }

  async function submitAssignment() {
    setSubmitting(true);
    const correct = qs.filter(q=>answers[q.id]===q.ans).length;
    try {
      await db.post("submissions",{assignment_id:doing.id,student_name:studentName,score:correct,total:qs.length,answers:{}});
      setResult({correct,total:qs.length});
      setDoneIds(d=>[...d,doing.id]);
    } catch(e) { setError(e.message); }
    setSubmitting(false);
  }

  // Exam screen
  if (doing && !result) {
    const q=qs[qIdx], answered=answers[q.id]!==undefined, pct=(qIdx/qs.length)*100;
    return (
      <div style={st.app}>
        <div style={st.hdr}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{...st.logo,fontSize:14}}>{doing.subject}</div>
            <div style={{fontSize:12,color:C.muted,fontFamily:"monospace",fontWeight:600}}>{qIdx+1}/{qs.length}</div>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:3}}>{doing.title}</div>
        </div>
        <div style={{height:3,background:C.border,margin:"0 14px 10px"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,"+C.accent+","+C.purple+")",width:pct+"%",transition:"width .3s"}}/>
        </div>
        <div style={st.card}>
          <div style={{fontSize:10,color:C.purple,fontWeight:800,marginBottom:8,textTransform:"uppercase"}}>{q.topic}</div>
          <div style={{fontSize:14,fontWeight:600,lineHeight:1.6,marginBottom:14}}>{q.q}</div>
          {q.opts.map((o,i)=>(
            <div key={i} style={opt(answers[q.id]===i)} onClick={()=>setAnswers(a=>({...a,[q.id]:i}))}>
              <div style={{width:24,height:24,borderRadius:"50%",background:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{["A","B","C","D"][i]}</div>
              <span style={{fontSize:13,lineHeight:1.4}}>{o}</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,padding:"0 14px"}}>
          {qIdx>0 && <button style={btnOut()} onClick={()=>setQIdx(i=>i-1)}>← Trước</button>}
          {qIdx<qs.length-1
            ? <button style={btn(C.accent)} disabled={!answered} onClick={()=>setQIdx(i=>i+1)}>Tiếp →</button>
            : <button style={btn(C.green)} disabled={!answered||submitting} onClick={submitAssignment}>
                {submitting?<span style={st.spin}/>:"Nộp bài ✓"}
              </button>
          }
        </div>
      </div>
    );
  }

  // Result screen
  if (result) {
    const pct=Math.round(result.correct/result.total*100);
    const c=pct>=70?C.green:pct>=50?C.yellow:C.red;
    return (
      <div style={{...st.app,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
        <div style={{fontSize:64,marginBottom:8}}>{pct>=70?"🏆":pct>=50?"👍":"📖"}</div>
        <div style={{fontSize:48,fontWeight:800,fontFamily:"monospace",color:c}}>{result.correct}/{result.total}</div>
        <div style={{fontSize:16,color:C.muted,marginTop:4}}>{pct}% chính xác</div>
        <div style={{fontSize:13,color:C.muted,marginTop:8,marginBottom:24,textAlign:"center"}}>
          {pct>=70?"Xuất sắc! Kết quả đã gửi giáo viên ✅":pct>=50?"Khá tốt! Cần cố gắng thêm":"Cần ôn tập thêm. Kết quả đã gửi giáo viên"}
        </div>
        <button style={btn(C.accent)} onClick={()=>{setDoing(null);loadData();}}>← Về danh sách bài</button>
      </div>
    );
  }

  // Assignment list
  return (
    <div style={st.app}>
      <div style={st.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18}}>←</button>
          <div>
            <div style={{...st.logo,fontSize:16}}>🎓 {studentName}</div>
            <div style={{fontSize:11,color:C.muted}}>Lớp: <strong style={{color:C.accent}}>{cls.code}</strong> · GV: {cls.teacher_name}</div>
          </div>
        </div>
      </div>
      {error && <div style={st.err}>⚠️ {error}</div>}
      {loading ? <div style={{textAlign:"center",padding:40}}><span style={st.spin}/></div> :
       assignments.length===0 ? <div style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:13}}>Chưa có bài tập nào</div> : (
        <>
          <p style={st.sec}>Bài tập ({assignments.length})</p>
          <div style={{...st.card,padding:"4px 0"}}>
            {assignments.map((a,i)=>{
              const done=doneIds.includes(a.id);
              const expired=a.deadline&&new Date(a.deadline)<new Date();
              return (
                <div key={a.id} style={{padding:"12px 14px",borderBottom:i<assignments.length-1?"1px solid "+C.border:"none"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:5}}>{a.title}</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        <span style={tag(C.accent)}>{a.subject}</span>
                        <span style={tag(C.purple)}>{a.num_questions} câu</span>
                        {done && <span style={tag(C.green)}>✓ Đã nộp</span>}
                        {expired&&!done && <span style={tag(C.red)}>⏰ Hết hạn</span>}
                        {a.deadline&&!expired && <span style={tag(C.yellow)}>⏰ {new Date(a.deadline).toLocaleDateString("vi")}</span>}
                      </div>
                    </div>
                    {!done&&!expired && (
                      <button onClick={()=>startAssignment(a)} style={btnSm(C.accent)}>Làm →</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// GUEST (SELF STUDY)
// ══════════════════════════════════════════════════════════════════════════════
function GuestApp({onBack}) {
  const [tab, setTab] = useState("home");
  const [scores, setScores] = useState(()=>{try{const s=localStorage.getItem("sm-s");return s?JSON.parse(s):DEF;}catch{return DEF;}});
  const [buf, setBuf] = useState({});
  const [exam, setExam] = useState({subject:null,idx:0,answers:{},done:false,results:null});

  useEffect(()=>{try{localStorage.setItem("sm-s",JSON.stringify(scores));}catch{}},[scores]);
  useEffect(()=>{
    const b={};
    SUBJECTS.forEach(s=>{const sc=scores[s]||{};b[s]={diemMieng:(sc.diemMieng||[]).join(", "),diemTX:(sc.diemTX||[]).join(", "),diemGK:sc.diemGK!=null?String(sc.diemGK):"",diemCK:sc.diemCK!=null?String(sc.diemCK):""}});
    setBuf(b);
  },[]);

  const tbmMap = useMemo(()=>{const m={};SUBJECTS.forEach(s=>{m[s]=calcTBM(scores[s])});return m;},[scores]);
  const tbmChung = useMemo(()=>{const v=Object.values(tbmMap).filter(t=>t!==null);return v.length?parseFloat((v.reduce((a,b)=>a+b,0)/v.length).toFixed(1)):null;},[tbmMap]);
  const oc = useMemo(()=>classify(tbmChung),[tbmChung]);

  function chgBuf(s,f,v){setBuf(b=>({...b,[s]:{...b[s],[f]:v}}))}
  function commitBuf(s,f){
    const raw=buf[s]?.[f]??"";
    if(f==="diemMieng"||f==="diemTX"){
      const arr=raw.split(/[,\s]+/).map(Number).filter(n=>!isNaN(n)&&n>=0&&n<=10);
      setScores(p=>({...p,[s]:{...p[s],[f]:arr}}));
    } else {
      const v=parseFloat(raw);
      setScores(p=>({...p,[s]:{...p[s],[f]:isNaN(v)?null:Math.min(10,Math.max(0,v))}}));
    }
  }
  function startExam(s){setExam({subject:s,idx:0,answers:{},done:false,results:null});setTab("practice");}
  function answerQ(qid,i){setExam(e=>({...e,answers:{...e.answers,[qid]:i}}));}
  function submitExam(){
    const qs=QUESTIONS[exam.subject];let c=0;
    const detail=qs.map(q=>{const ok=exam.answers[q.id]===q.ans;if(ok)c++;return{...q,ok,chosen:exam.answers[q.id]}});
    setExam(e=>({...e,done:true,results:{correct:c,total:qs.length,detail}}));
  }

  const NAV=[{id:"home",icon:"🏠",lbl:"Tổng quan"},{id:"scores",icon:"📊",lbl:"Điểm số"},{id:"practice",icon:"✏️",lbl:"Luyện tập"}];

  const Home = () => (
    <div>
      <div style={st.hdr}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={st.logo}>StudyMate AG</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>Tự luyện tập · THPT An Giang</div></div>
          <button onClick={onBack} style={{background:"none",border:"1px solid "+C.border,borderRadius:8,color:C.muted,cursor:"pointer",fontSize:11,padding:"5px 10px"}}>Đổi vai</button>
        </div>
      </div>
      <div style={st.hero}>
        <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".8px"}}>Điểm trung bình chung</div>
        <div style={{fontSize:56,fontWeight:800,fontFamily:"monospace",lineHeight:1,color:oc.color}}>{tbmChung??"-"}</div>
        <div style={{marginTop:10}}><span style={badge(oc.color)}>{oc.label}</span></div>
        <div style={{fontSize:11,color:C.muted,marginTop:6}}>Thông tư 22/2021/TT-BGDĐT</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:"0 14px"}}>
        {[{val:SUBJECTS.length,label:"Môn học",c:C.accent},{val:Object.values(tbmMap).filter(t=>t!==null&&t>=8).length,label:"Môn Giỏi",c:C.green},{val:Object.values(tbmMap).filter(t=>t!==null&&t<6.5).length,label:"Cần cải thiện",c:C.red},{val:SUBJECTS.reduce((a,s)=>a+(QUESTIONS[s]?.length||0),0),label:"Câu hỏi",c:C.purple}].map((s,i)=>(
          <div key={i} style={{background:C.surf,border:"1px solid "+C.border,borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:28,fontWeight:800,fontFamily:"monospace",color:s.c}}>{s.val}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <p style={st.sec}>Luyện tập nhanh</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"0 14px"}}>
        {SUBJECTS.map(s=><button key={s} style={{...btnOut(false),padding:"6px 13px",fontSize:12}} onClick={()=>startExam(s)}>{s}</button>)}
      </div>
      <p style={st.sec}>TBM từng môn</p>
      <div style={{...st.card,padding:"4px 0"}}>
        {SUBJECTS.map(s=>{const t=tbmMap[s],cl=classify(t);return(
          <div key={s} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid "+C.border,cursor:"pointer"}} onClick={()=>setTab("scores")}>
            <div style={{flex:1,fontSize:13,fontWeight:600}}>{s}</div>
            <div style={{flex:"0 0 80px",height:5,background:C.border,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:cl.color,width:t?t*10+"%":"0%"}}/></div>
            <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:cl.color,minWidth:30,textAlign:"right"}}>{t??"-"}</div>
            <span style={{...badge(cl.color),fontSize:10,padding:"2px 7px"}}>{cl.label}</span>
          </div>
        );})}
      </div>
    </div>
  );

  const Scores = () => (
    <div>
      <div style={st.hdr}><div style={{...st.logo,fontSize:16}}>📊 Điểm số</div></div>
      {SUBJECTS.map(s=>{const t=tbmMap[s],cl=classify(t),b=buf[s]||{};return(
        <div key={s}>
          <p style={st.sec}>{s} — <span style={{color:cl.color}}>{t??"-"} ({cl.label})</span></p>
          <div style={st.card}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{f:"diemMieng",lbl:"Điểm miệng",ph:"VD: 8, 7"},{f:"diemTX",lbl:"Điểm thường xuyên",ph:"VD: 7, 8, 6"},{f:"diemGK",lbl:"Giữa kỳ",ph:"VD: 7.5"},{f:"diemCK",lbl:"Cuối kỳ ⭐",ph:"VD: 8.0"}].map(({f,lbl,ph})=>(
                <div key={f}>
                  <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{lbl}</div>
                  <input style={st.input} placeholder={ph} value={b[f]??""} onChange={e=>chgBuf(s,f,e.target.value)} onBlur={()=>commitBuf(s,f)}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      );})}
    </div>
  );

  const Practice = () => {
    if (!exam.subject) return (
      <div>
        <div style={st.hdr}><div style={{...st.logo,fontSize:16}}>✏️ Luyện tập</div></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:14}}>
          {SUBJECTS.map(s=>{const t=tbmMap[s],cl=classify(t);return(
            <div key={s} onClick={()=>startExam(s)} style={{background:C.surf,border:"1px solid "+C.border,borderRadius:12,padding:13,cursor:"pointer"}}>
              <div style={{fontSize:13,fontWeight:700}}>{s}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>{QUESTIONS[s].length} câu</div>
              <span style={{...badge(cl.color),fontSize:10,padding:"2px 7px",marginTop:6,display:"inline-flex"}}>TBM: {t??"-"}</span>
            </div>
          );})}
        </div>
      </div>
    );
    if (exam.done && exam.results) {
      const {correct,total,detail}=exam.results,pct=Math.round(correct/total*100);
      const c=pct>=70?C.green:pct>=50?C.yellow:C.red;
      return (
        <div>
          <div style={st.hdr}><div style={{...st.logo,fontSize:16}}>🏆 Kết quả</div></div>
          <div style={{textAlign:"center",padding:"20px 14px"}}>
            <div style={{fontSize:52,fontWeight:800,fontFamily:"monospace",color:c}}>{correct}/{total}</div>
            <div style={{fontSize:13,color:C.muted,marginTop:4}}>{pct}% chính xác</div>
            <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:14}}>
              <button style={{...btnOut(false),padding:"11px 16px"}} onClick={()=>setExam({subject:null,idx:0,answers:{},done:false,results:null})}>Chọn môn khác</button>
              <button style={{...btn(C.accent,undefined,false),padding:"11px 16px"}} onClick={()=>startExam(exam.subject)}>Làm lại</button>
            </div>
          </div>
          <div style={{...st.card,padding:"4px 0"}}>
            {detail.map((q,i)=>(
              <div key={i} style={{padding:"10px 14px",borderBottom:i<detail.length-1?"1px solid "+C.border:"none"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <span>{q.ok?"✅":"❌"}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:C.purple,fontWeight:800,textTransform:"uppercase",marginBottom:2}}>{q.topic}</div>
                    <div style={{fontSize:12,lineHeight:1.5}}>{q.q}</div>
                    {!q.ok && <div style={{fontSize:11,color:C.green,marginTop:3}}>✓ Đáp án: <strong>{q.opts[q.ans]}</strong></div>}
                    {q.exp && <div style={{background:C.surf2,borderLeft:"3px solid "+C.accent,borderRadius:"0 8px 8px 0",padding:"8px 10px",marginTop:8,fontSize:11,lineHeight:1.6,color:"#94a3b8"}}>💡 {q.exp}</div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    const qs=QUESTIONS[exam.subject],q=qs[exam.idx],pct=(exam.idx/qs.length)*100,answered=exam.answers[q.id]!==undefined;
    return (
      <div>
        <div style={st.hdr}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{...st.logo,fontSize:14}}>{exam.subject}</div>
            <div style={{fontSize:12,color:C.muted,fontFamily:"monospace",fontWeight:600}}>{exam.idx+1}/{qs.length}</div>
          </div>
        </div>
        <div style={{height:3,background:C.border,margin:"0 14px 10px"}}><div style={{height:"100%",background:"linear-gradient(90deg,"+C.accent+","+C.purple+")",width:pct+"%",transition:"width .3s"}}/></div>
        <div style={st.card}>
          <div style={{fontSize:10,color:C.purple,fontWeight:800,marginBottom:8,textTransform:"uppercase"}}>{q.topic}</div>
          <div style={{fontSize:14,fontWeight:600,lineHeight:1.6,marginBottom:14}}>{q.q}</div>
          {q.opts.map((o,i)=>(
            <div key={i} style={opt(exam.answers[q.id]===i)} onClick={()=>answerQ(q.id,i)}>
              <div style={{width:24,height:24,borderRadius:"50%",background:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{["A","B","C","D"][i]}</div>
              <span style={{fontSize:13,lineHeight:1.4}}>{o}</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,padding:"0 14px"}}>
          {exam.idx>0 && <button style={btnOut()} onClick={()=>setExam(e=>({...e,idx:e.idx-1}))}>← Trước</button>}
          {exam.idx<qs.length-1
            ? <button style={btn(C.accent)} disabled={!answered} onClick={()=>setExam(e=>({...e,idx:e.idx+1}))}>Tiếp →</button>
            : <button style={btn(C.green)} disabled={!answered} onClick={submitExam}>Nộp bài ✓</button>
          }
        </div>
      </div>
    );
  };

  return (
    <div style={st.app}>
      {tab==="home" && <Home/>}
      {tab==="scores" && <Scores/>}
      {tab==="practice" && <Practice/>}
      <nav style={st.nav}>
        {NAV.map(n=>(
          <button key={n.id} style={nb(tab===n.id)}
            onClick={()=>{if(n.id==="practice"&&tab==="practice")setExam({subject:null,idx:0,answers:{},done:false,results:null});setTab(n.id);}}>
            <span style={{fontSize:19,lineHeight:1}}>{n.icon}</span>{n.lbl}
          </button>
        ))}
      </nav>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [role, setRole] = useState(null);
  const [teacherClass, setTeacherClass] = useState(null);
  const [studentInfo, setStudentInfo] = useState(null);
  function reset() { setRole(null); setTeacherClass(null); setStudentInfo(null); }
  if (!role) return <RoleSelect onSelect={setRole}/>;
  if (role==="guest") return <GuestApp onBack={reset}/>;
  if (role==="teacher"&&!teacherClass) return <TeacherLogin onLogin={c=>setTeacherClass(c)} onBack={reset}/>;
  if (role==="teacher"&&teacherClass) return <TeacherDashboard cls={teacherClass} onBack={reset}/>;
  if (role==="student"&&!studentInfo) return <StudentLogin onLogin={(c,n)=>setStudentInfo({cls:c,name:n})} onBack={reset}/>;
  if (role==="student"&&studentInfo) return <StudentDashboard cls={studentInfo.cls} studentName={studentInfo.name} onBack={reset}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
